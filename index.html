<style>
  * { box-sizing: border-box; }
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }

  :root {
    --bg: #14181D;
    --panel: #1B2027;
    --line: #2A313A;
    --text: #D9DEE4;
    --text-dim: #808A96;
    --day: #E8A23C;
    --night: #4C7EF3;
    --offduty: #E2574B;
    --rest: #E2574B;
    --today: #E8A23C;
  }

  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    height: 100%;
    overflow: hidden;
  }

  #page {
    font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif;
    max-width: 480px;
    margin: 0 auto;
    padding: calc(18px + env(safe-area-inset-top)) 14px calc(14px + env(safe-area-inset-bottom));
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  .board-head { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex: none; }
  .board-head .nav-btn {
    appearance: none; border: none; background: transparent; cursor: pointer;
    color: var(--text); font-size: 1.25rem; width: 44px; height: 44px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center; flex: none;
  }
  .board-head .nav-btn:active { background: var(--panel); }
  .board-head h2 {
    flex: 1; margin: 0; font-size: 1.1rem; text-align: center;
    font-family: 'SF Mono', Consolas, monospace; font-weight: 700; letter-spacing: .02em;
    font-variant-numeric: tabular-nums;
  }
  .board-head .settings-btn {
    appearance: none; border: 1.5px solid var(--day); background: color-mix(in srgb, var(--day) 16%, transparent);
    color: var(--day); font-weight: 700;
    border-radius: 999px; padding: 8px 12px; font-size: .76rem; cursor: pointer; font-family: inherit;
    flex: none; min-height: 36px;
  }
  .board-head .settings-btn:active { background: color-mix(in srgb, var(--day) 30%, transparent); }

  .legend { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; font-size: .74rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: .04em; flex: none; }
  .legend .chip { display: flex; align-items: center; gap: 5px; }
  .legend .swatch { width: 8px; height: 8px; border-radius: 2px; display: inline-block; flex: none; }

  .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 4px; flex: none; }
  .weekdays span {
    text-align: center; padding: 4px 0 8px; font-size: .72rem;
    font-family: 'SF Mono', Consolas, monospace; color: var(--text-dim);
  }
  .weekdays span:first-child { color: #E06B5C; }
  .weekdays span:last-child { color: #6B9CF7; }

  .grid-clip { flex: 1 1 auto; min-height: 0; overflow: hidden; }

  .grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px;
    border: 1px solid var(--line); background: var(--line);
    height: 100%;
    touch-action: pan-y;
  }

  .day {
    all: unset;
    box-sizing: border-box;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    position: relative;
    font-family: inherit;
    background: var(--panel);
    padding: 6px 6px;
    min-width: 0;
    min-height: 0;
    overflow: hidden;
  }
  .day.outside { pointer-events: none; opacity: .3; background: var(--bg); }
  .day:active:not(.outside) { background: #212832; }
  .day:focus-visible { outline: 2px solid var(--night); outline-offset: -2px; z-index: 2; }

  /* status badge (주/야/비/휴) on the left, date number on the right — one row.
     Font sizes scale down with the viewport (clamp) so the two never fight
     for space on a narrow phone, and flex-wrap is a hard safety net: if they
     still don't both fit, the number drops to its own line instead of
     overlapping the badge. */
  .top-row {
    display: flex; align-items: baseline; justify-content: space-between;
    column-gap: 5px; row-gap: 0; flex-wrap: wrap; flex: none;
  }
  .day .num {
    font-family: 'SF Mono', Consolas, monospace; font-variant-numeric: tabular-nums;
    font-size: clamp(.62rem, 3vw, .8rem); color: var(--text-dim); min-width: 0;
  }
  .day.is-today { box-shadow: inset 0 0 0 1.5px var(--today); }
  .day.sat .num { color: var(--night); }
  .day.sun .num { color: var(--rest); }
  .day.holiday .num { color: var(--rest); font-weight: 700; }

  .day .badge {
    font-size: clamp(.6rem, 2.9vw, .78rem); font-weight: 700; color: var(--cell-color);
    display: flex; align-items: center; white-space: nowrap; min-width: 0;
  }
  .day .badge::before {
    content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--cell-color); box-shadow: 0 0 6px 1px var(--cell-color); margin-right: 3px; flex: none;
  }

  /* holiday name sits right under the date, with a solid color chip so it
     reads clearly at a glance */
  .holiday-label {
    margin-top: 3px; align-self: flex-start; flex: none;
    font-size: .62rem; font-weight: 700; line-height: 1.2; color: #fff;
    background: var(--rest); border-radius: 4px; padding: 1px 5px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;
  }

  /* memo + team-of-the-day indicator are stacked in their own rows at the
     bottom of the cell, each getting the cell's FULL width — they never
     share a row, so neither one ever has to give up horizontal space to
     the other (that width-sharing is what caused memo text to wrap to a
     single character per line on narrow phones) */
  .bottom-block {
    margin-top: auto; display: flex; flex-direction: column; gap: 2px; min-width: 0;
  }

  .day .memo {
    font-size: .6rem; line-height: 1.22; color: var(--text);
    background: color-mix(in srgb, var(--cell-color) 22%, transparent);
    border-radius: 4px; padding: 2px 4px;
    max-height: 4.4em; overflow: hidden;
    word-break: break-word;
  }

  /* compact day-team/night-team indicator, e.g. "A>D" */
  .teaminfo {
    align-self: flex-end;
    display: flex; flex-direction: row; align-items: baseline; gap: 1px;
    white-space: nowrap;
    font-family: 'SF Mono', Consolas, monospace;
    font-size: .64rem; line-height: 1; opacity: .6; color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }
  .teaminfo .me { opacity: 1; font-weight: 700; color: var(--cell-color); }

  /* ============ scrim ============ */
  .scrim {
    position: fixed; inset: 0; background: rgba(0,0,0,.5);
    opacity: 0; pointer-events: none; transition: opacity .18s ease; z-index: 40;
  }
  .scrim.open { opacity: 1; pointer-events: auto; }

  /* ============ editor bottom sheet ============ */
  .editor {
    position: fixed; left: 0; right: 0; bottom: 0; width: 100%;
    max-height: 82vh; overflow-y: auto;
    background: var(--panel); color: var(--text);
    box-shadow: 0 -14px 32px rgba(0,0,0,.5);
    border-radius: 20px 20px 0 0;
    transform: translateY(100%); transition: transform .24s ease;
    z-index: 41; padding: 10px 20px calc(20px + env(safe-area-inset-bottom));
    font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif;
  }
  .editor.open { transform: translateY(0); }

  .sheet-handle { width: 36px; height: 4px; border-radius: 999px; background: var(--line); margin: 0 auto 14px; }

  .editor-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .editor-head h3 { margin: 0; font-size: 1.05rem; font-family: 'SF Mono', Consolas, monospace; }
  .editor-close {
    appearance: none; border: none; background: transparent; color: var(--text);
    font-size: 1.2rem; cursor: pointer; opacity: .6; width: 32px; height: 32px;
  }

  .field-label { font-size: .72rem; text-transform: uppercase; letter-spacing: .06em; opacity: .55; margin: 16px 0 8px; }
  .field-label:first-of-type { margin-top: 0; }

  .status-picker { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .status-picker button {
    appearance: none; cursor: pointer; font-family: inherit; font-size: .88rem;
    border-radius: 10px; padding: 12px 10px; display: flex; align-items: center; gap: 8px;
    border: 1.5px solid var(--line); background: transparent; color: var(--text); min-height: 44px;
  }
  .status-picker button .dot { width: 10px; height: 10px; border-radius: 50%; flex: none; }
  .status-picker button[aria-pressed="true"] {
    border-color: var(--cell-color); background: color-mix(in srgb, var(--cell-color) 16%, transparent); font-weight: 700;
  }

  .memo-input {
    width: 100%; min-height: 88px; resize: vertical; font-family: inherit; font-size: .92rem;
    border-radius: 10px; border: 1.5px solid var(--line); padding: 10px 12px;
    background: var(--bg); color: var(--text); line-height: 1.5;
  }
  .memo-input:focus-visible, .memo-input:focus { outline: 2px solid var(--night); outline-offset: 1px; }

  .editor-done {
    margin-top: 20px; width: 100%; appearance: none; border: none; cursor: pointer;
    background: var(--day); color: #1a1206; font-family: inherit; font-size: .95rem; font-weight: 700;
    padding: 13px; border-radius: 10px; min-height: 48px;
  }

  /* ============ settings modal ============ */
  .modal-scrim {
    position: fixed; inset: 0; background: rgba(0,0,0,.5);
    display: none; align-items: center; justify-content: center; z-index: 50; padding: 20px;
  }
  .modal-scrim.open { display: flex; }
  .modal {
    background: var(--panel); color: var(--text); border-radius: 16px; padding: 22px; width: min(340px, 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif;
  }
  .modal h3 { margin: 0 0 6px; font-size: 1.02rem; }
  .modal p { margin: 0 0 16px; font-size: .8rem; opacity: .65; line-height: 1.5; }
  .modal input[type="date"] {
    width: 100%; padding: 11px 12px; border-radius: 8px; border: 1.5px solid var(--line);
    font-family: inherit; font-size: .9rem; background: var(--bg); color: var(--text); margin-bottom: 16px; min-height: 44px;
  }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-actions button {
    appearance: none; cursor: pointer; font-family: inherit; font-size: .86rem;
    padding: 10px 16px; border-radius: 8px; border: 1px solid var(--line); background: transparent; color: var(--text);
    min-height: 42px;
  }
  .modal-actions button.primary { background: var(--day); color: #1a1206; border-color: var(--day); font-weight: 700; }

  .team-picker { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 4px; }
  .team-picker button {
    appearance: none; cursor: pointer; font-family: inherit; font-size: .95rem; font-weight: 700;
    border-radius: 10px; padding: 12px 0; border: 1.5px solid var(--line); background: transparent; color: var(--text);
    min-height: 44px;
  }
  .team-picker button[aria-pressed="true"] { border-color: var(--day); background: color-mix(in srgb, var(--day) 16%, transparent); color: var(--day); }
</style>
</head>
<body>

<div id="page">
  <div class="board-head">
    <button type="button" class="nav-btn" id="prevMonth" aria-label="이전 달">‹</button>
    <h2 id="monthLabel">2026년 7월</h2>
    <button type="button" class="nav-btn" id="nextMonth" aria-label="다음 달">›</button>
    <button type="button" class="settings-btn" id="settingsBtn">내 조: A · 설정</button>
  </div>
  <div class="legend" id="legend"></div>
  <div class="weekdays">
    <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
  </div>
  <div class="grid-clip">
    <div class="grid" id="calendarGrid"></div>
  </div>
</div>

<div class="scrim" id="scrim"></div>
<div class="editor" id="editor">
  <div class="sheet-handle"></div>
  <div class="editor-head">
    <h3 id="editorDate">7월 5일 (일)</h3>
    <button type="button" class="editor-close" id="editorClose" aria-label="닫기">✕</button>
  </div>
  <div class="field-label">근무 상태</div>
  <div class="status-picker" id="statusPicker"></div>
  <div class="field-label">메모</div>
  <textarea class="memo-input" id="memoInput" placeholder="이 날짜에 대한 메모를 입력하세요"></textarea>
  <button type="button" class="editor-done" id="editorDone">완료</button>
</div>

<div class="modal-scrim" id="settingsScrim">
  <div class="modal">
    <h3>내 조 설정</h3>
    <p>4개 조(A·B·C·D)는 2일씩 어긋난 같은 8일 주기로 근무합니다. 내가 속한 조를 선택하세요.</p>
    <div class="team-picker" id="teamPicker"></div>
    <div class="modal-actions">
      <button type="button" id="settingsCancel">취소</button>
      <button type="button" class="primary" id="settingsSave">저장</button>
    </div>
  </div>
</div>

<script>
(function () {
  var PATTERN = ['주간', '주간', '야간', '비번', '휴무', '야간', '비번', '휴무'];
  var STATUS_TOKEN = { '주간': 'day', '야간': 'night', '비번': 'offduty', '휴무': 'rest' };
  var STATUS_SHORT = { '주간': '주', '야간': '야', '비번': '비', '휴무': '휴' };
  var STATUS_LIST = ['주간', '야간', '비번', '휴무'];
  var TEAM_ORDER = ['A', 'B', 'C', 'D'];
  var TEAM_INDEX = { A: 0, B: 1, C: 2, D: 3 };

  // Fixed, permanent reference point for the whole rotation: on this date,
  // team B starts its "주간" (day-shift) turn. Every team's schedule, forever
  // in the past or future, is computed from this single fixed anchor — it is
  // not user-editable.
  var ANCHOR_DATE = '2026-07-02';
  var ANCHOR_TEAM = 'B';

  // 2026년 대한민국 법정공휴일(대체공휴일 포함). 제헌절은 2026.5.11 시행된
  // 개정 법률로 19년 만에 공휴일로 재지정되어 포함함. 다른 연도는 아직 데이터가 없음.
  var HOLIDAYS = {
    '2026-01-01': '신정',
    '2026-02-16': '설날연휴',
    '2026-02-17': '설날',
    '2026-02-18': '설날연휴',
    '2026-03-01': '삼일절',
    '2026-03-02': '대체공휴일',
    '2026-05-05': '어린이날',
    '2026-05-24': '부처님오신날',
    '2026-05-25': '대체공휴일',
    '2026-06-06': '현충일',
    '2026-07-17': '제헌절',
    '2026-08-15': '광복절',
    '2026-08-17': '대체공휴일',
    '2026-09-24': '추석연휴',
    '2026-09-25': '추석',
    '2026-09-26': '추석연휴',
    '2026-10-03': '개천절',
    '2026-10-05': '대체공휴일',
    '2026-10-09': '한글날',
    '2026-12-25': '크리스마스'
  };

  var today = new Date();
  var todayStr = fmt(today.getFullYear(), today.getMonth() + 1, today.getDate());

  var state = {
    myTeam: 'A',
    year: today.getFullYear(),
    month: today.getMonth() + 1,
    overrides: {},
    activeDate: null
  };

  // Each visitor's own team/memos are saved to their own browser (localStorage),
  // so nothing here is shared between different people.
  var STORAGE_KEY = 'work-schedule-app-v1';
  function saveState() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        myTeam: state.myTeam,
        overrides: state.overrides
      }));
    } catch (e) { /* storage unavailable (private mode, etc.) — app still works, just won't persist */ }
  }
  function loadState() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : null;
    } catch (e) { return null; }
  }
  var saved = loadState();
  if (saved) {
    if (saved.myTeam) state.myTeam = saved.myTeam;
    if (saved.overrides) state.overrides = saved.overrides;
  }

  function pad(n) { return String(n).length < 2 ? '0' + n : '' + n; }
  function fmt(y, m, d) { return y + '-' + pad(m) + '-' + pad(d); }
  function parseDate(s) {
    var p = s.split('-');
    return new Date(parseInt(p[0], 10), parseInt(p[1], 10) - 1, parseInt(p[2], 10));
  }
  function diffDays(fromStr, toStr) {
    var a = parseDate(fromStr), b = parseDate(toStr);
    return Math.round((b - a) / 86400000);
  }
  function addDays(dateStr, n) {
    var d = parseDate(dateStr);
    d.setDate(d.getDate() + n);
    return fmt(d.getFullYear(), d.getMonth() + 1, d.getDate());
  }
  // Teams are the same 8-day pattern offset by 2 days from each other (A→B→C→D→A…),
  // which guarantees exactly one team is 주간 and one is 야간 on any given day.
  // Always computed from the fixed ANCHOR_DATE/ANCHOR_TEAM above.
  function getTeamStart(team) {
    return addDays(ANCHOR_DATE, 2 * (TEAM_INDEX[team] - TEAM_INDEX[ANCHOR_TEAM]));
  }
  function getTeamStatusOn(team, dateStr) {
    var diff = diffDays(getTeamStart(team), dateStr);
    var idx = ((diff % 8) + 8) % 8;
    return PATTERN[idx];
  }
  function getDayNightTeams(dateStr) {
    var result = { 주간: null, 야간: null };
    TEAM_ORDER.forEach(function (t) {
      var s = getTeamStatusOn(t, dateStr);
      if (s === '주간' || s === '야간') result[s] = t;
    });
    return result;
  }
  function getDefaultStatus(dateStr) {
    return getTeamStatusOn(state.myTeam, dateStr);
  }
  function getStatus(dateStr) {
    var o = state.overrides[dateStr];
    return (o && o.status) ? o.status : getDefaultStatus(dateStr);
  }
  function getMemo(dateStr) {
    var o = state.overrides[dateStr];
    return (o && o.memo) ? o.memo : '';
  }
  function setStatus(dateStr, status) {
    state.overrides[dateStr] = Object.assign({}, state.overrides[dateStr], { status: status });
    saveState();
  }
  function setMemo(dateStr, memo) {
    state.overrides[dateStr] = Object.assign({}, state.overrides[dateStr], { memo: memo });
    saveState();
  }

  var WEEKDAY_LABEL = ['일', '월', '화', '수', '목', '금', '토'];

  function renderLegend() {
    var legend = document.getElementById('legend');
    legend.innerHTML = '';
    STATUS_LIST.forEach(function (s) {
      var chip = document.createElement('span');
      chip.className = 'chip';
      var sw = document.createElement('span');
      sw.className = 'swatch';
      sw.style.background = 'var(--' + STATUS_TOKEN[s] + ')';
      chip.appendChild(sw);
      var label = document.createElement('span');
      label.textContent = s;
      chip.appendChild(label);
      legend.appendChild(chip);
    });
  }

  function renderHeader() {
    document.getElementById('monthLabel').textContent = state.year + '년 ' + state.month + '월';
    document.getElementById('settingsBtn').textContent = '내 조: ' + state.myTeam + ' · 설정';
  }

  function renderGrid() {
    var grid = document.getElementById('calendarGrid');
    grid.innerHTML = '';

    var firstOfMonth = new Date(state.year, state.month - 1, 1);
    var startWeekday = firstOfMonth.getDay();
    var daysInMonth = new Date(state.year, state.month, 0).getDate();
    var daysInPrevMonth = new Date(state.year, state.month - 1, 0).getDate();

    var cells = [];
    for (var i = startWeekday - 1; i >= 0; i--) {
      var pm = state.month - 1, py = state.year;
      if (pm === 0) { pm = 12; py -= 1; }
      cells.push({ y: py, m: pm, d: daysInPrevMonth - i, outside: true });
    }
    for (var d = 1; d <= daysInMonth; d++) {
      cells.push({ y: state.year, m: state.month, d: d, outside: false });
    }
    var remain = (7 - (cells.length % 7)) % 7;
    for (var n = 1; n <= remain; n++) {
      var nm = state.month + 1, ny = state.year;
      if (nm === 13) { nm = 1; ny += 1; }
      cells.push({ y: ny, m: nm, d: n, outside: true });
    }

    // Fill the grid down to the bottom of the screen: as many rows as this
    // month actually needs (4–6), each stretched to share the leftover height.
    grid.style.gridTemplateRows = 'repeat(' + (cells.length / 7) + ', 1fr)';

    cells.forEach(function (c, idx) {
      var dateStr = fmt(c.y, c.m, c.d);
      var holidayName = HOLIDAYS[dateStr];
      var weekday = idx % 7; // grid always starts on Sunday (column 0), per the 일월화수목금토 header
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'day'
        + (c.outside ? ' outside' : '')
        + (dateStr === todayStr ? ' is-today' : '')
        + (holidayName ? ' holiday' : '')
        + (weekday === 0 ? ' sun' : weekday === 6 ? ' sat' : '');
      btn.dataset.date = dateStr;

      if (!c.outside) {
        var status = getStatus(dateStr);
        var memo = getMemo(dateStr);
        btn.dataset.status = status;
        btn.style.setProperty('--cell-color', 'var(--' + STATUS_TOKEN[status] + ')');

        // Status badge (주/야/비/휴) on the left, date number on the right — one row.
        var topRow = document.createElement('span');
        topRow.className = 'top-row';

        var badge = document.createElement('span');
        badge.className = 'badge';
        badge.textContent = STATUS_SHORT[status];
        topRow.appendChild(badge);

        var num = document.createElement('span');
        num.className = 'num';
        num.textContent = c.d;
        topRow.appendChild(num);

        btn.appendChild(topRow);

        // Holiday name directly under the date, as its own solid-color chip.
        if (holidayName) {
          var holidayEl = document.createElement('span');
          holidayEl.className = 'holiday-label';
          holidayEl.textContent = holidayName;
          btn.appendChild(holidayEl);
        }

        // Memo and the day-team/night-team indicator ("A>D") are stacked in
        // their own rows here, each using the cell's full width, so they
        // never have to split a row's width with each other.
        var bottomBlock = document.createElement('span');
        bottomBlock.className = 'bottom-block';

        if (memo) {
          var memoEl = document.createElement('span');
          memoEl.className = 'memo';
          memoEl.textContent = memo;
          bottomBlock.appendChild(memoEl);
        }

        var dn = getDayNightTeams(dateStr);
        var teaminfo = document.createElement('span');
        teaminfo.className = 'teaminfo';
        teaminfo.title = '주간조 ' + dn['주간'] + ' · 야간조 ' + dn['야간'];
        var daySpan = document.createElement('span');
        daySpan.className = dn['주간'] === state.myTeam ? 'me' : '';
        daySpan.textContent = dn['주간'];
        var nightSpan = document.createElement('span');
        nightSpan.className = dn['야간'] === state.myTeam ? 'me' : '';
        nightSpan.textContent = dn['야간'];
        var sep = document.createElement('span');
        sep.textContent = '>';
        teaminfo.appendChild(daySpan);
        teaminfo.appendChild(sep);
        teaminfo.appendChild(nightSpan);
        bottomBlock.appendChild(teaminfo);

        btn.appendChild(bottomBlock);

        btn.addEventListener('click', function () {
          if (justSwiped) return;
          openEditor(this.dataset.date);
        });
      } else {
        var num2 = document.createElement('span');
        num2.className = 'num';
        num2.textContent = c.d;
        btn.appendChild(num2);
      }

      grid.appendChild(btn);
    });
  }

  function render() {
    renderHeader();
    renderLegend();
    renderGrid();
  }

  // ---- editor bottom sheet ----
  var editor = document.getElementById('editor');
  var scrim = document.getElementById('scrim');
  var statusPicker = document.getElementById('statusPicker');
  var memoInput = document.getElementById('memoInput');
  var editorDate = document.getElementById('editorDate');

  function buildStatusPicker() {
    statusPicker.innerHTML = '';
    STATUS_LIST.forEach(function (s) {
      var b = document.createElement('button');
      b.type = 'button';
      b.dataset.status = s;
      var dot = document.createElement('span');
      dot.className = 'dot';
      dot.style.background = 'var(--' + STATUS_TOKEN[s] + ')';
      b.appendChild(dot);
      var label = document.createElement('span');
      label.textContent = s;
      b.appendChild(label);
      b.addEventListener('click', function () {
        if (!state.activeDate) return;
        setStatus(state.activeDate, s);
        renderGrid();
        updateEditorFields();
      });
      statusPicker.appendChild(b);
    });
  }
  buildStatusPicker();

  function updateEditorFields() {
    if (!state.activeDate) return;
    var status = getStatus(state.activeDate);
    var color = 'var(--' + STATUS_TOKEN[status] + ')';
    Array.prototype.forEach.call(statusPicker.children, function (b) {
      var pressed = b.dataset.status === status;
      b.setAttribute('aria-pressed', pressed ? 'true' : 'false');
      b.style.setProperty('--cell-color', pressed ? color : '');
    });
    memoInput.value = getMemo(state.activeDate);
  }

  function lockScroll(lock) {
    document.body.style.overflow = lock ? 'hidden' : '';
  }

  function openEditor(dateStr) {
    state.activeDate = dateStr;
    var dt = parseDate(dateStr);
    var holidayName = HOLIDAYS[dateStr];
    editorDate.textContent = (dt.getMonth() + 1) + '월 ' + dt.getDate() + '일 (' + WEEKDAY_LABEL[dt.getDay()] + ')' + (holidayName ? ' · ' + holidayName : '');
    updateEditorFields();
    editor.classList.add('open');
    scrim.classList.add('open');
    lockScroll(true);
  }
  function closeEditor() {
    editor.classList.remove('open');
    scrim.classList.remove('open');
    state.activeDate = null;
    lockScroll(false);
  }
  document.getElementById('editorClose').addEventListener('click', closeEditor);
  document.getElementById('editorDone').addEventListener('click', closeEditor);
  scrim.addEventListener('click', closeEditor);
  memoInput.addEventListener('input', function () {
    if (!state.activeDate) return;
    setMemo(state.activeDate, memoInput.value);
    renderGrid();
  });

  // ---- settings modal (team choice only — the rotation's start date is
  // fixed forever at ANCHOR_DATE/ANCHOR_TEAM above and isn't user-editable) ----
  var settingsScrim = document.getElementById('settingsScrim');
  var teamPicker = document.getElementById('teamPicker');
  var draftTeam = state.myTeam;

  TEAM_ORDER.forEach(function (t) {
    var b = document.createElement('button');
    b.type = 'button';
    b.dataset.team = t;
    b.textContent = t + '조';
    b.addEventListener('click', function () {
      draftTeam = t;
      Array.prototype.forEach.call(teamPicker.children, function (c) {
        c.setAttribute('aria-pressed', c === b ? 'true' : 'false');
      });
    });
    teamPicker.appendChild(b);
  });

  document.getElementById('settingsBtn').addEventListener('click', function () {
    draftTeam = state.myTeam;
    Array.prototype.forEach.call(teamPicker.children, function (c) {
      c.setAttribute('aria-pressed', c.dataset.team === draftTeam ? 'true' : 'false');
    });
    settingsScrim.classList.add('open');
    lockScroll(true);
  });
  document.getElementById('settingsCancel').addEventListener('click', function () {
    settingsScrim.classList.remove('open');
    lockScroll(false);
  });
  document.getElementById('settingsSave').addEventListener('click', function () {
    state.myTeam = draftTeam;
    saveState();
    renderHeader();
    renderGrid();
    settingsScrim.classList.remove('open');
    lockScroll(false);
  });

  // ---- month nav ----
  var calendarGrid = document.getElementById('calendarGrid');
  var ANIM_MS = 220;
  var SWIPE_THRESHOLD = 46;
  var justSwiped = false;

  function applyMonthDelta(delta) {
    if (delta < 0) {
      state.month -= 1;
      if (state.month === 0) { state.month = 12; state.year -= 1; }
    } else {
      state.month += 1;
      if (state.month === 13) { state.month = 1; state.year += 1; }
    }
    render();
  }

  // Slide the whole grid out in `direction`, swap in the new month positioned
  // just off the opposite edge, then slide it into place — used for both the
  // ‹/› buttons and a released swipe past the threshold.
  function animateMonthChange(direction) {
    var exitTo = direction < 0 ? '100%' : '-100%';
    var enterFrom = direction < 0 ? '-100%' : '100%';
    justSwiped = true;
    calendarGrid.style.transition = 'transform ' + ANIM_MS + 'ms ease';
    calendarGrid.style.transform = 'translateX(' + exitTo + ')';
    var done = false;
    function proceed() {
      if (done) return;
      done = true;
      calendarGrid.removeEventListener('transitionend', proceed);
      applyMonthDelta(direction);
      calendarGrid.style.transition = 'none';
      calendarGrid.style.transform = 'translateX(' + enterFrom + ')';
      void calendarGrid.offsetWidth; // force reflow so the jump registers before animating in
      calendarGrid.style.transition = 'transform ' + ANIM_MS + 'ms ease';
      calendarGrid.style.transform = 'translateX(0)';
      setTimeout(function () { justSwiped = false; }, ANIM_MS + 40);
    }
    calendarGrid.addEventListener('transitionend', proceed);
    setTimeout(proceed, ANIM_MS + 80); // fallback in case transitionend doesn't fire
  }

  document.getElementById('prevMonth').addEventListener('click', function () { animateMonthChange(-1); });
  document.getElementById('nextMonth').addEventListener('click', function () { animateMonthChange(1); });

  // ---- drag the grid with the finger to change month ----
  var drag = { active: false, id: null, startX: 0, startY: 0, dx: 0, decided: false, horizontal: false };

  calendarGrid.addEventListener('pointerdown', function (e) {
    if (e.pointerType === 'mouse' && e.button !== 0) return;
    drag.active = true;
    drag.id = e.pointerId;
    drag.startX = e.clientX;
    drag.startY = e.clientY;
    drag.dx = 0;
    drag.decided = false;
    drag.horizontal = false;
    calendarGrid.style.transition = 'none';
    // Pointer capture is only taken once a horizontal drag is confirmed
    // (in pointermove below) — capturing on every pointerdown would swallow
    // the native click event a plain tap needs to open the day editor.
  });

  calendarGrid.addEventListener('pointermove', function (e) {
    if (!drag.active || e.pointerId !== drag.id) return;
    var dx = e.clientX - drag.startX;
    var dy = e.clientY - drag.startY;
    if (!drag.decided) {
      if (Math.abs(dx) > 8 || Math.abs(dy) > 8) {
        drag.decided = true;
        drag.horizontal = Math.abs(dx) > Math.abs(dy) * 1.2;
        if (drag.horizontal) {
          try { calendarGrid.setPointerCapture(e.pointerId); } catch (err) {}
        }
      }
    }
    if (drag.decided && drag.horizontal) {
      drag.dx = dx;
      calendarGrid.style.transform = 'translateX(' + dx + 'px)';
    }
  });

  function endDrag(e) {
    if (!drag.active || e.pointerId !== drag.id) return;
    drag.active = false;
    var dx = drag.dx;
    var wasHorizontalDrag = drag.decided && drag.horizontal;
    drag.dx = 0; drag.decided = false; drag.horizontal = false;
    if (!wasHorizontalDrag) return; // a plain tap — let the click open the editor
    if (Math.abs(dx) > SWIPE_THRESHOLD) {
      animateMonthChange(dx > 0 ? -1 : 1);
    } else {
      justSwiped = true;
      calendarGrid.style.transition = 'transform ' + ANIM_MS + 'ms ease';
      calendarGrid.style.transform = 'translateX(0)';
      setTimeout(function () { justSwiped = false; }, ANIM_MS + 40);
    }
  }
  calendarGrid.addEventListener('pointerup', endDrag);
  calendarGrid.addEventListener('pointercancel', function (e) {
    if (!drag.active || e.pointerId !== drag.id) return;
    drag.active = false;
    drag.decided = false; drag.horizontal = false; drag.dx = 0;
    calendarGrid.style.transition = 'transform ' + ANIM_MS + 'ms ease';
    calendarGrid.style.transform = 'translateX(0)';
  });

  render();
})();
</script>
</body>
</html>
